name: Daily Health Check

# Her gün İstanbul saatiyle 09:07'de çalışır (UTC+3 → 06:07 UTC).
# 3 fazlı kontrol:
#   1) Uptime  — frontend + backend public endpoint'leri
#   2) Smoke   — login, authenticated profile, applications listesi
#   3) Rapor   — status.md'ye reverse-chrono yazar + auto-commit
#
# Manuel tetikleme: Actions → Daily Health Check → Run workflow

on:
  schedule:
    - cron: '7 6 * * *'   # 09:07 Istanbul (UTC+3)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run health checks
        id: checks
        env:
          FRONTEND_URL: https://hotel-platform-seven.vercel.app
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          BOT_EMAIL: ${{ secrets.HEALTHCHECK_BOT_EMAIL }}
          BOT_PASSWORD: ${{ secrets.HEALTHCHECK_BOT_PASSWORD }}
        run: |
          set +e

          # Yardımcı: URL'i kontrol et, "kod|süre" döndür
          check() {
            local url="$1"
            local timeout="${2:-15}"
            curl -sS -o /dev/null \
                 -w "%{http_code}|%{time_total}" \
                 --max-time "$timeout" \
                 -H "User-Agent: AjansHotel-HealthCheck/1.0" \
                 "$url" 2>/dev/null || echo "000|0"
          }

          # Auth gerekli endpoint kontrolü (Bearer token ile)
          check_auth() {
            local url="$1"
            local token="$2"
            local timeout="${3:-15}"
            curl -sS -o /dev/null \
                 -w "%{http_code}|%{time_total}" \
                 --max-time "$timeout" \
                 -H "Authorization: Bearer $token" \
                 -H "User-Agent: AjansHotel-HealthCheck/1.0" \
                 "$url" 2>/dev/null || echo "000|0"
          }

          # Sonucu emoji+detay formatına çevir
          format() {
            local label="$1"
            local result="$2"
            local expected="${3:-200}"
            local code=$(echo "$result" | cut -d'|' -f1)
            local time=$(echo "$result" | cut -d'|' -f2)
            if [ "$code" = "$expected" ]; then
              printf "| %s | ✅ %s | %.2fs |\n" "$label" "$code" "$time"
            else
              printf "| %s | ❌ %s | %.2fs |\n" "$label" "$code" "$time"
            fi
          }

          # ────────────────────────────────────────────────
          # FAZ 1 — UPTIME
          # ────────────────────────────────────────────────
          UP_LINES=""
          UP_LINES+=$(format "Frontend (Vercel)"          "$(check "$FRONTEND_URL")")$'\n'

          if [ -n "$BACKEND_URL" ]; then
            UP_LINES+=$(format "Backend OpenAPI"           "$(check "$BACKEND_URL/v3/api-docs")")$'\n'
            UP_LINES+=$(format "Backend listings (public)" "$(check "$BACKEND_URL/api/listings?page=0&size=1")")$'\n'
          else
            UP_LINES+="| Backend | ⚠️ N/A | BACKEND_URL secret eksik |"$'\n'
          fi

          # ────────────────────────────────────────────────
          # FAZ 2 — SMOKE (login + authenticated endpoints)
          # ────────────────────────────────────────────────
          SMOKE_LINES=""

          if [ -z "$BACKEND_URL" ] || [ -z "$BOT_EMAIL" ] || [ -z "$BOT_PASSWORD" ]; then
            SMOKE_LINES+="| Smoke test | ⚠️ N/A | Bot credentials secret eksik |"$'\n'
          else
            # Secret'tan baş/son boşluk ve newline'ları temizle (paste hatasına karşı savunma).
            # Bizim botun şifresinde whitespace YOK, o yüzden güvenli.
            BOT_EMAIL=$(printf '%s' "$BOT_EMAIL" | tr -d '[:space:]')
            BOT_PASSWORD=$(printf '%s' "$BOT_PASSWORD" | tr -d '[:space:]')

            # Debug: secret'ların ayarlandığını kanıtla (gerçek değerler değil)
            echo "::group::Smoke test debug"
            echo "Email length (trimmed)    : ${#BOT_EMAIL}"
            echo "Password length (trimmed) : ${#BOT_PASSWORD}"
            echo "::endgroup::"

            # JSON güvenli inşa — jq özel karakterleri (!, ", \, vb.) doğru escape eder
            LOGIN_BODY=$(jq -nc --arg email "$BOT_EMAIL" --arg pwd "$BOT_PASSWORD" \
                            '{email:$email, password:$pwd}')

            LOGIN_START=$(date +%s.%N)
            LOGIN_RESP=$(curl -sS -X POST "$BACKEND_URL/api/auth/login" \
                              -H "Content-Type: application/json" \
                              --data-raw "$LOGIN_BODY" \
                              --max-time 20 \
                              -w "\n[HTTP:%{http_code}]" 2>/dev/null)
            LOGIN_END=$(date +%s.%N)
            LOGIN_TIME=$(awk "BEGIN {printf \"%.2f\", $LOGIN_END - $LOGIN_START}")
            LOGIN_CODE=$(echo "$LOGIN_RESP" | grep -o '\[HTTP:[0-9]*\]' | grep -o '[0-9]*')
            TOKEN=$(echo "$LOGIN_RESP" | grep -o '"token":"[^"]*' | cut -d'"' -f4)

            # Eğer başarısız olursa response body'sini logla (token gizli olur)
            if [ "$LOGIN_CODE" != "200" ]; then
              echo "::group::Login failed — response body"
              echo "$LOGIN_RESP" | sed 's/[0-9]\{20,\}/[REDACTED-TOKEN]/g'
              echo "::endgroup::"
            fi

            if [ "$LOGIN_CODE" = "200" ] && [ -n "$TOKEN" ]; then
              SMOKE_LINES+=$(printf "| Login (POST /auth/login) | ✅ 200 | %.2fs |\n" "$LOGIN_TIME")$'\n'

              # Profile (auth gerekli)
              PROFILE_LINE=$(format "Profile (GET /candidate/profile)" \
                                    "$(check_auth "$BACKEND_URL/api/candidate/profile" "$TOKEN")")
              SMOKE_LINES+="$PROFILE_LINE"$'\n'

              # Başvurularım (auth gerekli)
              APPS_LINE=$(format "My applications (GET /candidate/applications)" \
                                 "$(check_auth "$BACKEND_URL/api/candidate/applications" "$TOKEN")")
              SMOKE_LINES+="$APPS_LINE"$'\n'
            else
              SMOKE_LINES+=$(printf "| Login (POST /auth/login) | ❌ %s | %.2fs |\n" "${LOGIN_CODE:-000}" "$LOGIN_TIME")$'\n'
              SMOKE_LINES+="| Authenticated checks | ⏭️ skipped | login başarısız |"$'\n'
            fi
          fi

          # ────────────────────────────────────────────────
          # FAZ 3 — ENDPOINT SENTINEL
          # 5 kritik public endpoint'i tara, herhangi biri 5xx ise alarm.
          # Internal exception'lar (Hibernate, NPE, vb.) genelde 500 olarak yansır.
          # ────────────────────────────────────────────────
          SENTINEL_LINES=""
          SENTINEL_FAILED=0
          SENTINEL_TOTAL=0

          # 5xx döndü mü? Sadece HTTP code kontrolü
          probe() {
            local label="$1"
            local url="$2"
            local result=$(check "$url" 10)
            local code=$(echo "$result" | cut -d'|' -f1)
            local time=$(echo "$result" | cut -d'|' -f2)
            SENTINEL_TOTAL=$((SENTINEL_TOTAL + 1))
            # 5xx veya 000 (timeout) hata
            if [ "${code:0:1}" = "5" ] || [ "$code" = "000" ]; then
              SENTINEL_FAILED=$((SENTINEL_FAILED + 1))
              printf "| %s | 🚨 %s | %.2fs |\n" "$label" "$code" "$time"
            elif [ "$code" = "200" ] || [ "$code" = "204" ] || [ "$code" = "401" ] || [ "$code" = "403" ]; then
              # 401/403 yetki hatası — endpoint çalışıyor demek
              printf "| %s | ✅ %s | %.2fs |\n" "$label" "$code" "$time"
            else
              printf "| %s | ⚠️ %s | %.2fs |\n" "$label" "$code" "$time"
            fi
          }

          if [ -n "$BACKEND_URL" ]; then
            SENTINEL_LINES+=$(probe "GET /listings (no filter)"   "$BACKEND_URL/api/listings?page=0&size=5")$'\n'
            SENTINEL_LINES+=$(probe "GET /listings (position)"    "$BACKEND_URL/api/listings?position=WAITER&page=0&size=5")$'\n'
            SENTINEL_LINES+=$(probe "GET /listings (date filter)" "$BACKEND_URL/api/listings?dateFrom=2026-06-01&page=0&size=5")$'\n'
            SENTINEL_LINES+=$(probe "GET /v3/api-docs"            "$BACKEND_URL/v3/api-docs")$'\n'
            SENTINEL_LINES+=$(probe "GET /swagger-ui.html"        "$BACKEND_URL/swagger-ui/index.html")$'\n'
          else
            SENTINEL_LINES+="| Sentinel | ⚠️ N/A | BACKEND_URL secret eksik |"$'\n'
          fi

          # Sentinel özet satırı
          if [ "$SENTINEL_FAILED" -gt 0 ]; then
            SENTINEL_SUMMARY="🚨 $SENTINEL_FAILED/$SENTINEL_TOTAL endpoint 5xx döndü"
          else
            SENTINEL_SUMMARY="✅ Tüm $SENTINEL_TOTAL endpoint sağlıklı"
          fi

          # GitHub Actions output'larına aktar
          {
            echo "up_lines<<EOF"
            echo "$UP_LINES"
            echo "EOF"
            echo "smoke_lines<<EOF"
            echo "$SMOKE_LINES"
            echo "EOF"
            echo "sentinel_lines<<EOF"
            echo "$SENTINEL_LINES"
            echo "EOF"
            echo "sentinel_summary=$SENTINEL_SUMMARY"
          } >> "$GITHUB_OUTPUT"

      - name: Update status.md
        run: |
          DATE=$(TZ=Europe/Istanbul date +"%Y-%m-%d %H:%M %Z")

          # Yeni entry'yi geçici dosyaya yaz
          cat > /tmp/new_entry.md <<EOF
          ## $DATE

          **Uptime**

          | Check | Status | Time |
          |---|---|---|
          ${{ steps.checks.outputs.up_lines }}

          **Smoke Test** (auth flow)

          | Check | Status | Time |
          |---|---|---|
          ${{ steps.checks.outputs.smoke_lines }}

          **Endpoint Sentinel** — ${{ steps.checks.outputs.sentinel_summary }}

          | Check | Status | Time |
          |---|---|---|
          ${{ steps.checks.outputs.sentinel_lines }}

          ---

          EOF

          # Header (her zaman aynı) + yeni entry + eski entry'ler
          cat > /tmp/new_status.md <<'HDR'
          # Daily Health Check

          Otomatik kontrol — her gün 09:07 İstanbul saati (GitHub Actions).
          3 fazlı: Uptime + Smoke Test (auth) + Endpoint Sentinel.
          En son rapor en üstte.

          ---

          HDR

          cat /tmp/new_entry.md >> /tmp/new_status.md

          if [ -f status.md ]; then
            awk '/^## [0-9]{4}-/{found=1} found' status.md >> /tmp/new_status.md
          fi

          mv /tmp/new_status.md status.md

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet status.md; then
            echo "status.md değişmedi, commit yok."
            exit 0
          fi

          git add status.md
          git commit -m "chore: günlük sağlık kontrolü $(TZ=Europe/Istanbul date +%Y-%m-%d)"
          git push
