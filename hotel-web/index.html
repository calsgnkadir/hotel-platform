<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AjansHotel — İstanbul'un İş Platformu</title>
    <meta name="description" content="İstanbul'daki hotel, restoran ve kafelerde günlük/aylık iş arayan adaylarla işletmeleri buluşturan platform." />

    <!-- FAZ 2/#8 — PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7e22ce" />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA mobile capable (modern standart) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS PWA legacy (Safari hala bunu istiyor) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AjansHotel" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Microsoft Tile -->
    <meta name="msapplication-TileColor" content="#7e22ce" />

    <!-- FAZ 3 — SEO ek meta tags -->
    <meta name="keywords" content="hotel iş, restoran iş, kafe iş, İstanbul iş, garson, resepsiyon, yarı zamanlı iş, otel personeli, hospitality, vardiyalı iş" />
    <meta name="author" content="AjansHotel" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hotel-platform-seven.vercel.app/" />

    <!-- Open Graph (sosyal paylasim) -->
    <meta property="og:title" content="AjansHotel — İstanbul'un İş Platformu" />
    <meta property="og:description" content="Otel, restoran, kafe yarı zamanlı işleri için modern platform. Vardiya seç, başvur, mesajlaş — saatlik ücret + bahşiş şeffaflığı." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hotel-platform-seven.vercel.app/" />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:site_name" content="AjansHotel" />
    <meta property="og:locale" content="tr_TR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AjansHotel — İstanbul'un İş Platformu" />
    <meta name="twitter:description" content="Otel, restoran, kafe yarı zamanlı işleri için modern platform." />
    <meta name="twitter:image" content="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
