<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Çevrimdışı · AjansHotel</title>
  <meta name="theme-color" content="#1e3a5f" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0c1726;
      color: #fde9a5;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 700px 500px at 15% 25%, rgba(30, 58, 95, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 600px 500px at 85% 75%, rgba(212, 168, 83, 0.18) 0%, transparent 60%),
        #0c1726;
    }
    .card {
      max-width: 440px;
      width: 100%;
      background: linear-gradient(135deg, rgba(21, 36, 61, 0.85), rgba(15, 23, 38, 0.85));
      border: 1px solid rgba(212, 168, 83, 0.28);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef6461;
      box-shadow: 0 0 12px #ef6461;
      display: inline-block;
      margin-right: 8px;
    }
    .tag {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: #fbd768;
      margin-bottom: 14px;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 30px; font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      margin: 0 0 10px;
    }
    p {
      font-size: 14px; line-height: 1.65;
      color: #cbd5e1;
      margin: 0 0 22px;
    }
    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #d4a853, #f7c43c);
      color: #0c1726;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(212, 168, 83, 0.35);
      cursor: pointer;
      border: none;
      transition: transform 150ms;
    }
    .btn:active { transform: scale(0.98); }
    .hint {
      margin-top: 18px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="tag"><span class="dot"></span>Çevrimdışı</span>
    <h1>Bağlantı yok</h1>
    <p>
      İnternet bağlantın kesilmiş gibi görünüyor. Sayfayı yeniden yüklemeyi dene —
      bağlantın geri geldiğinde AjansHotel kaldığı yerden devam eder.
    </p>
    <button class="btn" onclick="location.reload()">Tekrar Dene</button>
    <div class="hint">Önbellekteki sohbet ve ilanlar erişilebilir kalır.</div>
  </div>
  <script>
    window.addEventListener('online', () => location.reload())
  </script>
</body>
</html>
