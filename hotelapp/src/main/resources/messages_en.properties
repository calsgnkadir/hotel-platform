# FAZ 12 — Backend i18n messages (English)
# MessageFormat args {0}, {1}... UTF-8 encoding (application.yml).

# ---- General ----
error.resource.notFound={0} not found: {1}
error.access.denied=You are not authorized to perform this action
error.badCredentials=Incorrect email or password
error.body.unreadable=Request body could not be read (malformed JSON)
error.param.missing=Required parameter missing: {0}
error.server.generic=Something went wrong on the server. Please try again.

# ---- Auth ----
error.auth.refreshNotFound=Refresh token not found
error.auth.refreshInvalid=Invalid refresh token
error.auth.refreshExpired=Refresh token has expired. Please sign in again.
error.auth.tokenBreach=Token security breach detected. Please sign in again.
error.auth.passwordTooShort=Password must be at least 8 characters.
error.auth.passwordSame=New password cannot be the same as the old one
error.auth.currentPasswordWrong=Current password is incorrect
error.auth.resetLinkInvalid=Invalid or already used link.
error.auth.resetLinkExpired=This link has expired. Please request a new one.
error.auth.resetLinkUsed=This link has already been used. Please request a new one.

# ---- Ownership (403) ----
error.application.notOwner=This application does not belong to you
error.listing.notOwner=This listing does not belong to you
error.document.notOwner=This document does not belong to you
error.document.noAccess=You do not have access to this document
error.photo.notOwner=This photo does not belong to you
error.conversation.noAccess=You do not have access to this conversation
error.request.notOwner=This request does not belong to you

# ---- Application flow (422) ----
error.application.duplicate=You have already applied to this listing
error.application.dupAccepted=Your application for this listing was already accepted. You cannot apply again.
error.application.dupReviewing=Your application for this listing is being reviewed by the business.
error.application.dupActive=You already have an active application for this listing.
error.application.holdOnlyPending=Only PENDING/REVIEWING applications can be put on HOLD. Current: {0}
error.application.holdRespondOnly=Only applications in HOLD status can be responded to. Current: {0}
error.application.holdExpired=HOLD period has expired - application closed
error.application.decisionInvalid=Invalid decision. Send only ACCEPTED or REJECTED
error.application.slotRequired=Day selection is required

# ---- Listing (422) ----
error.listing.slotRequired=You must add at least 1 shift slot to the listing
error.listing.slotNotBelong=Slot does not belong to this listing: {0}

# ---- Message (422) ----
error.message.selfConversation=You cannot start a conversation with yourself
error.message.notInConversation=Message does not belong to this conversation
error.message.parentNotInConversation=The replied message does not belong to this conversation
error.message.reactionInvalid=Invalid reaction type

# ---- Business/profile (422) ----
error.business.profileNotFound=Business profile not found. Please register first.
error.favorite.candidateOnly=Only candidate accounts can be favorited
error.availability.maxBlocks=You can define at most 20 availability blocks
