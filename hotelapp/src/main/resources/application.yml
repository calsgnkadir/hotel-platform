server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: dev
  datasource:
    # connectionTimeZone + forceConnectionTimeZoneToSession: MySQL Connector/J 8.x
    # JDBC katmanı LocalDate'i bu zaman dilimine göre işlemeli (1 gün kayma fix).
    # preserveInstants=false: LocalDateTime'a timezone dönüşümü uygulanmasın.
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hotel_platform}?useSSL=false&serverTimezone=Europe/Istanbul&connectionTimeZone=Europe/Istanbul&forceConnectionTimeZoneToSession=true&preserveInstants=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    # open-in-view: true (default) — JSON serialization aşamasında lazy collection'ları
    # yükleyebilmek için açık tutuyoruz. CandidateProfileDto içinde @ElementCollection
    # field'lar (languages, availabilityTypes, preferredDistricts, preferredPositions)
    # var; bunlar serialize edilirken Hibernate session lazım.
    # NOT: Eager fetch'e geçirip bunu kapatabiliriz ileride (performans için).
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
        # dialect belirtilmedi — Hibernate JDBC bağlantısından otomatik algılar (MySQLDialect)
        # Hibernate'in temporal tipler için kullanacağı zaman dilimi.
        # LocalDate'in java.sql.Date'e dönüşümünde 1 gün kaymayı önler.
        jdbc:
          time_zone: Europe/Istanbul

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-at-least-32-characters-long-!!!}
  expiration: ${JWT_EXPIRATION:86400000}

# #92: Google OAuth2 sign-in
# Boş bırakırsan OAuth2 login bypass edilir (sadece local form çalışır).
# Lokal: IntelliJ Run Config → Environment Variables ile
# Prod: Railway env vars
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id:     ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:         profile, email
            redirect-uri:  "{baseUrl}/login/oauth2/code/{registrationId}"

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}   # legacy, artık kullanılmıyor — Cloudinary kullanıyoruz

# Cloudinary — kalıcı dosya/foto storage
# Format: cloudinary://API_KEY:API_SECRET@CLOUD_NAME
# Dev: .env'den veya IntelliJ run config'ten gelir
# Prod: Railway env var
cloudinary:
  url: ${CLOUDINARY_URL:}

# #80: Email (Resend) + frontend reset link base URL
app:
  # Frontend URL — reset linki için (https://hotel-platform-seven.vercel.app)
  base-url: ${APP_BASE_URL:http://localhost:5173}

  email:
    resend:
      # Resend API key — yoksa email "DEV MODE" log'a düşer (gerçek mail gitmez)
      # https://resend.com/api-keys
      api-key:  ${RESEND_API_KEY:}
      # Resend default test domain: onboarding@resend.dev
      # Kendi domain'in olunca buraya değiştir (DNS doğrulamadan sonra)
      from:     ${RESEND_FROM:onboarding@resend.dev}
      from-name: ${RESEND_FROM_NAME:AjansHotel}
    password-reset:
      expiry-hours: ${PWD_RESET_EXPIRY_HOURS:1}

# Swagger UI — http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha       # tag'lere göre alfabetik sırala
    operations-sorter: alpha
    display-request-duration: true
    disable-swagger-default-url: true

logging:
  level:
    com.hotelapp: ${LOG_LEVEL:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
