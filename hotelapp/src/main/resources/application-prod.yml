# Production profili — Railway deploy
# Çalıştırmak için ENV: SPRING_PROFILES_ACTIVE=prod
#
# ⚠ Bu yml secret içermez. Tüm hassas değerler Railway env vars'dan gelir:
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD, JWT_SECRET
#   APP_CORS_ALLOWED_ORIGINS  (örn: https://hotel-platform.vercel.app)

# #92: Railway proxy arkasındaki HTTPS scheme'i tanı — OAuth redirect URI https:// olsun
server:
  forward-headers-strategy: framework

spring:
  datasource:
    # Tarih kayması fix: connectionTimeZone + forceConnectionTimeZoneToSession + preserveInstants=false
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=Europe/Istanbul&connectionTimeZone=Europe/Istanbul&forceConnectionTimeZoneToSession=true&preserveInstants=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP — düşük trafik için bağlantı havuzunu küçült (RAM tasarrufu)
    hikari:
      maximum-pool-size: 3      # Varsayılan 10 — küçük app için 3 yeter
      minimum-idle: 1           # Varsayılan 10 — boşken sadece 1 bağlantı tut
      idle-timeout: 60000       # 1 dk
      max-lifetime: 600000      # 10 dk
      connection-timeout: 20000 # 20 sn

  jpa:
    hibernate:
      ddl-auto: update     # İlk deploy'da tabloları yaratır, sonrasında schema değişiklikleri uygular
    show-sql: false        # Prod'da SQL loglanmasın
    properties:
      hibernate:
        format_sql: false
        # Hibernate temporal tipler için zaman dilimi — LocalDate 1 gün geri kaymayı önler
        jdbc:
          time_zone: Europe/Istanbul

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

# CORS — Vercel domain'i env var ile gelir
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

# File uploads — Cloudinary'ye geçildi (Railway ephemeral disk veri kaybı sorunu)
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}   # legacy, artık kullanılmıyor

# Cloudinary — kalıcı dosya/foto storage (Railway env var)
cloudinary:
  url: ${CLOUDINARY_URL}

# Logging — prod'da gürültü azalt
logging:
  level:
    root: INFO
    com.hotelapp: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
