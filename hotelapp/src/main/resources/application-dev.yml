# Geliştirme profili — sadece local kullanım için
# Çalıştırmak için: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# VEYA: java -jar app.jar --spring.profiles.active=dev
#
# ⚠️ Bu dosyayı git'e push etme — .gitignore'a ekle
# .env.example'dan .env oluşturup buraya gerek kalmadan da kullanabilirsin

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hotel_platform}?useSSL=false&serverTimezone=Europe/Istanbul&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update   # İlk çalışmada tabloları otomatik oluşturur
    show-sql: true       # Dev'de SQL'i console'a yaz

jwt:
  # Dev varsayılanı; production'da JWT_SECRET environment variable ile override edilir
  secret: ${JWT_SECRET:dev-only-secret-key-at-least-32-characters-long-!!!}
  expiration: 86400000
file:
  upload-dir: ./uploads

logging:
  level:
    com.hotelapp: DEBUG
    org.springframework.security: DEBUG
