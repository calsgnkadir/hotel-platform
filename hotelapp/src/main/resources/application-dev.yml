# Geliştirme profili — sadece local kullanım için
# Çalıştırmak için: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# VEYA: java -jar app.jar --spring.profiles.active=dev
#
# ⚠️ Bu dosyayı git'e push etme — .gitignore'a ekle
# .env.example'dan .env oluşturup buraya gerek kalmadan da kullanabilirsin

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hotel_platform}?useSSL=false&serverTimezone=Europe/Istanbul&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update   # İlk çalışmada tabloları otomatik oluşturur
    # show-sql KAPALI — Hibernate SQL log'lari konsol tikamasin. Belirli bir sorguya
    # bakman gerekirse tek seferlik JPA_SHOW_SQL=true env var ile ac.
    show-sql: false

jwt:
  # Dev varsayılanı; production'da JWT_SECRET environment variable ile override edilir
  secret: ${JWT_SECRET:dev-only-secret-key-at-least-32-characters-long-!!!}
  expiration: 86400000
file:
  upload-dir: ./uploads

app:
  # FAZ F.6 — Dev'de HSTS kapali (localhost TLS yok; aksi halde browser
  # bu domain'i 1 yil HTTPS-only isaretler, dev'i bozar)
  security:
    hsts-enabled: false
  # Dev'de scheduler'lari sakinlestir — konsol noise + gereksiz DB yuku dusurulur.
  # (Prod varsayilan degerleri: outbox 5sn, pulse 30sn.)
  outbox:
    relayDelayMs: 15000
  pulse:
    intervalMs: 60000

logging:
  level:
    com.hotelapp: DEBUG
    # Security DEBUG cok spam yapiyor (her istekte SecurityContext dump) -> INFO
    # Auth flow'unda sorun cikarsa tek seferlik LOG_LEVEL_SECURITY=DEBUG env ile ac
    org.springframework.security: INFO
    # Belt & suspenders — base'de zaten WARN ama override edilirse yakalar
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
